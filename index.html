<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Antonio Valladares | Inicio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="navbar-content">
      <button id="menu-toggle" class="hamburger">☰</button>

      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="commander.html">Commander</a></li>
        <li><a href="#">Ilustraciones</a></li>
        <li><a href="#">Proyectos</a></li>
      </ul>

      <div id="theme-switch" class="switch">
        <div class="slider">
          <span class="icon">🌙</span>
        </div>
      </div>
    </div>
  </nav>

  <div class="presentation">
    <div class="avatar-circle">
      <img src="jabali.png" alt="Mi Jabali" onerror="this.src='https://via.placeholder.com/200'" />
    </div>
    <h1>¡Buenas! Soy Antonio Valladares</h1>
    <p>Soy desarrollador, friki de los juegos de rol y creador de herramientas como el Randomizador de Commander. Aquí iré publicando mis proyectos y cosillas que me molan.</p>
  </div>

  <script>
    // Switch de tema
    const themeSwitch = document.getElementById("theme-switch");
    const icon = themeSwitch.querySelector(".icon");
    const savedTheme = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

    function setTheme(isLight) {
      document.body.classList.toggle('light-mode', isLight);
      icon.textContent = isLight ? '☀️' : '🌙';
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
    }

    setTheme(savedTheme === 'light' || (!savedTheme && !prefersDark));

    themeSwitch.addEventListener('click', () => {
      const isLight = !document.body.classList.contains('light-mode');
      setTheme(isLight);
    });

    // Menú hamburguesa
    const menuToggle = document.getElementById("menu-toggle");
    const navLinks = document.getElementById("nav-links");

    menuToggle.addEventListener("click", () => {
      navLinks.classList.toggle("open");
    });

    document.addEventListener("click", (e) => {
      const isClickInside = navLinks.contains(e.target) || menuToggle.contains(e.target);
      if (!isClickInside) {
        navLinks.classList.remove("open");
      }
    });
  </script>
</body>
</html>
