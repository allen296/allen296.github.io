<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Antonio Valladares | Inicio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="navbar-content">
      <div class="nav-left">
        <button class="hamburger" id="hamburger">&#9776;</button>
      </div>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="commander.html">Commander</a></li>
        <li><a href="#">Ilustraciones</a></li>
        <li><a href="#">Proyectos</a></li>
      </ul>
      <div class="nav-right">
        <div class="switch" id="theme-toggle">
          <div class="slider"></div>
        </div>
      </div>
    </div>
  </nav>

  <div class="presentation">
    <div class="avatar-circle">
      <img src="jabali.png" alt="Mi Jabali" onerror="this.src='https://via.placeholder.com/200'" />
    </div>
    <h1>¡Buenas! Soy Antonio Valladares</h1>
    <p>Soy desarrollador, friki de los juegos de rol y creador de herramientas como el Randomizador de Commander. Aquí iré publicando mis proyectos y cosillas que me molan.</p>
  </div>

  <script>
    const toggleBtn = document.getElementById('theme-toggle');
    const slider = toggleBtn.querySelector('.slider');
    const savedTheme = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

    if (savedTheme === 'light' || (!savedTheme && !prefersDark)) {
      document.body.classList.add('light-mode');
    }

    toggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('light-mode');
      const isLight = document.body.classList.contains('light-mode');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
    });

    // Hamburguesa
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.getElementById('nav-links');
    hamburger.addEventListener('click', () => {
      navLinks.classList.toggle('open');
    });
  </script>
</body>
</html>
