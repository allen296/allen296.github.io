<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Commander Randomizer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- PLAYER 1 -->
    <div class="player left" id="player1">
      <div class="checkboxes">
        <label class="white"><input type="checkbox" value="W">W</label>
        <label class="blue"><input type="checkbox" value="U">U</label>
        <label class="black"><input type="checkbox" value="B">B</label>
        <label class="red"><input type="checkbox" value="R">R</label>
        <label class="green"><input type="checkbox" value="G">G</label>
      </div>
      <div class="card-section">
        <div class="controls">
          <label class="toggle legendary"><input type="checkbox" class="legendary-check" checked>Legendaria</label>
          <label class="toggle lock"><input type="checkbox" class="lock-check">Lock</label>
        </div>
        <div class="image-slot" id="player1-img"></div>
      </div>
    </div>

    <!-- PLAYER 2 -->
    <div class="player left" id="player2">
      <div class="checkboxes">
        <label class="white"><input type="checkbox" value="W">W</label>
        <label class="blue"><input type="checkbox" value="U">U</label>
        <label class="black"><input type="checkbox" value="B">B</label>
        <label class="red"><input type="checkbox" value="R">R</label>
        <label class="green"><input type="checkbox" value="G">G</label>
      </div>
      <div class="card-section">
        <div class="controls">
          <label class="toggle legendary"><input type="checkbox" class="legendary-check" checked>Legendaria</label>
          <label class="toggle lock"><input type="checkbox" class="lock-check">Lock</label>
        </div>
        <div class="image-slot" id="player2-img"></div>
      </div>
    </div>

    <div class="middle">
      <button id="randomize">Randomize</button>
    </div>

    <!-- PLAYER 3 -->
    <div class="player right" id="player3">
      <div class="card-section">
        <div class="controls">
          <label class="toggle legendary"><input type="checkbox" class="legendary-check" checked>Legendaria</label>
          <label class="toggle lock"><input type="checkbox" class="lock-check">Lock</label>
        </div>
        <div class="image-slot" id="player3-img"></div>
      </div>
      <div class="checkboxes">
        <label class="white"><input type="checkbox" value="W">W</label>
        <label class="blue"><input type="checkbox" value="U">U</label>
        <label class="black"><input type="checkbox" value="B">B</label>
        <label class="red"><input type="checkbox" value="R">R</label>
        <label class="green"><input type="checkbox" value="G">G</label>
      </div>
    </div>
