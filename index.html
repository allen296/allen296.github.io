<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commander Magic Randomizer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Commander Magic Randomizer</h1>
  </header>
  <main>
    <div class="card-grid">
      <div class="card-slot" id="player1">
        <img class="card-img" src="" alt="Commander 1" />
        <div class="color-select">
          <label><input type="checkbox" value="W">White</label>
          <label><input type="checkbox" value="U">Blue</label>
          <label><input type="checkbox" value="B">Black</label>
          <label><input type="checkbox" value="R">Red</label>
          <label><input type="checkbox" value="G">Green</label>
        </div>
      </div>
      <div class="card-slot" id="player2">
        <img class="card-img" src="" alt="Commander 2" />
        <div class="color-select">
          <label><input type="checkbox" value="W">White</label>
          <label><input type="checkbox" value="U">Blue</label>
          <label><input type="checkbox" value="B">Black</label>
          <label><input type="checkbox" value="R">Red</label>
          <label><input type="checkbox" value="G">Green</label>
        </div>
      </div>
      <div class="card-slot" id="player3">
        <img class="card-img" src="" alt="Commander 3" />
        <div class="color-select">
          <label><input type="checkbox" value="W">White</label>
          <label><input type="checkbox" value="U">Blue</label>
          <label><input type="checkbox" value="B">Black</label>
          <label><input type="checkbox" value="R">Red</label>
          <label><input type="checkbox" value="G">Green</label>
        </div>
      </div>
      <div class="card-slot" id="player4">
        <img class="card-img" src="" alt="Commander 4" />
        <div class="color-select">
          <label><input type="checkbox" value="W">White</label>
          <label><input type="checkbox" value="U">Blue</label>
          <label><input type="checkbox" value="B">Black</label>
          <label><input type="checkbox" value="R">Red</label>
          <label><input type="checkbox" value="G">Green</label>
        </div>
      </div>
    </div>
    <button id="generateBtn">Generate</button>
  </main>
  <script src="script.js"></script>
</body>
</html>
