<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Commander Randomizer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="navbar-content">
      <div class="nav-left">
        <button class="hamburger" id="hamburger">&#9776;</button>
      </div>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="commander.html">Commander</a></li>
        <li><a href="#">Ilustraciones</a></li>
        <li><a href="#">Proyectos</a></li>
      </ul>
      <div class="nav-right">
        <div class="switch" id="theme-toggle">
          <div class="slider"></div>
        </div>
      </div>
    </div>
  </nav>

  <div class="container">

    <!-- Jugadores de arriba -->
    <div class="row">
      <!-- Jugador 1 -->
      <div class="player" id="player1">
        <div class="checkboxes">
          <label class="white"><input type="checkbox" value="W" data-color>W</label>
          <label class="blue"><input type="checkbox" value="U" data-color>U</label>
          <label class="black"><input type="checkbox" value="B" data-color>B</label>
          <label class="red"><input type="checkbox" value="R" data-color>R</label>
          <label class="green"><input type="checkbox" value="G" data-color>G</label>
          <label class="colorless"><input type="checkbox" value="C" data-color>C</label>
        </div>
        <div class="card-section">
          <div class="image-slot" id="player1-img"></div>
        </div>
      </div>

      <!-- Controles centrales para jugador 1 y 2 -->
      <div class="controls-column">
        <div class="control-line">
          <input type="checkbox" class="legendary-toggle" id="legendary1" checked>
          <span>Legendaria</span>
          <input type="checkbox" class="legendary-toggle" id="legendary2" checked>
        </div>
        <div class="control-line">
          <input type="checkbox" class="lock-toggle" id="lock1">
          <span>Lock</span>
          <input type="checkbox" class="lock-toggle" id="lock2">
        </div>
        <div class="control-line">
          <input type="checkbox" class="random-toggle" id="random1">
          <span>Cualquier color</span>
          <input type="checkbox" class="random-toggle" id="random2">
        </div>
      </div>

      <!-- Jugador 2 -->
      <div class="player" id="player2">
        <div class="card-section">
          <div class="image-slot" id="player2-img"></div>
        </div>
        <div class="checkboxes">
          <label class="white"><input type="checkbox" value="W" data-color>W</label>
          <label class="blue"><input type="checkbox" value="U" data-color>U</label>
          <label class="black"><input type="checkbox" value="B" data-color>B</label>
          <label class="red"><input type="checkbox" value="R" data-color>R</label>
          <label class="green"><input type="checkbox" value="G" data-color>G</label>
          <label class="colorless"><input type="checkbox" value="C" data-color>C</label>
        </div>
      </div>
    </div>

    <!-- Botón -->
    <div style="margin: 20px;"><button id="randomize">Randomize</button></div>

    <!-- Jugadores de abajo -->
    <div class="row">
      <!-- Jugador 3 -->
      <div class="player" id="player3">
        <div class="checkboxes">
          <label class="white"><input type="checkbox" value="W" data-color>W</label>
          <label class="blue"><input type="checkbox" value="U" data-color>U</label>
          <label class="black"><input type="checkbox" value="B" data-color>B</label>
          <label class="red"><input type="checkbox" value="R" data-color>R</label>
          <label class="green"><input type="checkbox" value="G" data-color>G</label>
          <label class="colorless"><input type="checkbox" value="C" data-color>C</label>
        </div>
        <div class="card-section">
          <div class="image-slot" id="player3-img"></div>
        </div>
      </div>

      <!-- Controles centrales para jugador 3 y 4 -->
      <div class="controls-column">
        <div class="control-line">
          <input type="checkbox" class="legendary-toggle" id="legendary3" checked>
          <span>Legendaria</span>
          <input type="checkbox" class="legendary-toggle" id="legendary4" checked>
        </div>
        <div class="control-line">
          <input type="checkbox" class="lock-toggle" id="lock3">
          <span>Lock</span>
          <input type="checkbox" class="lock-toggle" id="lock4">
        </div>
        <div class="control-line">
          <input type="checkbox" class="random-toggle" id="random3">
          <span>Cualquier color</span>
          <input type="checkbox" class="random-toggle" id="random4">
        </div>
      </div>

      <!-- Jugador 4 -->
      <div class="player" id="player4">
        <div class="card-section">
          <div class="image-slot" id="player4-img"></div>
        </div>
        <div class="checkboxes">
          <label class="white"><input type="checkbox" value="W" data-color>W</label>
          <label class="blue"><input type="checkbox" value="U" data-color>U</label>
          <label class="black"><input type="checkbox" value="B" data-color>B</label>
          <label class="red"><input type="checkbox" value="R" data-color>R</label>
          <label class="green"><input type="checkbox" value="G" data-color>G</label>
          <label class="colorless"><input type="checkbox" value="C" data-color>C</label>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    const toggleBtn = document.getElementById('theme-toggle');
    const slider = toggleBtn.querySelector('.slider');
    const savedTheme = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

    if (savedTheme === 'light' || (!savedTheme && !prefersDark)) {
      document.body.classList.add('light-mode');
    }

    toggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('light-mode');
      const isLight = document.body.classList.contains('light-mode');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
    });

    // Hamburguesa
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.getElementById('nav-links');
    hamburger.addEventListener('click', () => {
      navLinks.classList.toggle('open');
    });
  </script>
</body>
</html>
