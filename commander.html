<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Commander Randomizer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <ul>
      <li><a href="index.html">Inicio</a></li>
      <li><a href="commander.html">Commander</a></li>
      <li><a href="#">Ilustraciones</a></li>
      <li><a href="#">Proyectos</a></li>
    </ul>
    <div class="theme-toggle" id="theme-toggle">🌙</div>
  </nav>

  <div class="container">
    <!-- FILA SUPERIOR -->
    <div class="row">
      <div class="checkboxes left" id="p1-colors">
        <label class="white"><input type="checkbox" value="W" data-color>W</label>
        <label class="blue"><input type="checkbox" value="U" data-color>U</label>
        <label class="black"><input type="checkbox" value="B" data-color>B</label>
        <label class="red"><input type="checkbox" value="R" data-color>R</label>
        <label class="green"><input type="checkbox" value="G" data-color>G</label>
      </div>

      <div class="card-section" id="player1">
        <div class="image-slot" id="player1-img"></div>
      </div>

      <div class="controls-column">
        <div class="control-line">
          <input type="checkbox" class="legendary-toggle-player1" checked>
          <span>Legendaria</span>
          <input type="checkbox" class="legendary-toggle-player2" checked>
        </div>
        <div class="control-line">
          <input type="checkbox" class="lock-toggle-player1">
          <span>Lock</span>
          <input type="checkbox" class="lock-toggle-player2">
        </div>
        <div class="control-line">
          <input type="checkbox" class="random-toggle-player1">
          <span>Cualquier color</span>
          <input type="checkbox" class="random-toggle-player2">
        </div>
      </div>

      <div class="card-section" id="player2">
        <div class="image-slot" id="player2-img"></div>
      </div>

      <div class="checkboxes right" id="p2-colors">
        <label class="white"><input type="checkbox" value="W" data-color>W</label>
        <label class="blue"><input type="checkbox" value="U" data-color>U</label>
        <label class="black"><input type="checkbox" value="B" data-color>B</label>
        <label class="red"><input type="checkbox" value="R" data-color>R</label>
        <label class="green"><input type="checkbox" value="G" data-color>G</label>
      </div>
    </div>

    <div class="middle">
      <button id="randomize">Randomize</button>
    </div>

    <!-- FILA INFERIOR -->
    <div class="row">
      <div class="checkboxes left" id="p3-colors">
        <label class="white"><input type="checkbox" value="W" data-color>W</label>
        <label class="blue"><input type="checkbox" value="U" data-color>U</label>
        <label class="black"><input type="checkbox" value="B" data-color>B</label>
        <label class="red"><input type="checkbox" value="R" data-color>R</label>
        <label class="green"><input type="checkbox" value="G" data-color>G</label>
      </div>

      <div class="card-section" id="player3">
        <div class="image-slot" id="player3-img"></div>
      </div>

      <div class="controls-column">
        <div class="control-line">
          <input type="checkbox" class="legendary-toggle-player3" checked>
          <span>Legendaria</span>
          <input type="checkbox" class="legendary-toggle-player4" checked>
        </div>
        <div class="control-line">
          <input type="checkbox" class="lock-toggle-player3">
          <span>Lock</span>
          <input type="checkbox" class="lock-toggle-player4">
        </div>
        <div class="control-line">
          <input type="checkbox" class="random-toggle-player3">
          <span>Cualquier color</span>
          <input type="checkbox" class="random-toggle-player4">
        </div>
      </div>

      <div class="card-section" id="player4">
        <div class="image-slot" id="player4-img"></div>
      </div>

      <div class="checkboxes right" id="p4-colors">
        <label class="white"><input type="checkbox" value="W" data-color>W</label>
        <label class="blue"><input type="checkbox" value="U" data-color>U</label>
        <label class="black"><input type="checkbox" value="B" data-color>B</label>
        <label class="red"><input type="checkbox" value="R" data-color>R</label>
        <label class="green"><input type="checkbox" value="G" data-color>G</label>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    const toggleBtn = document.getElementById('theme-toggle');
    const savedTheme = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

    if (savedTheme === 'light' || (!savedTheme && !prefersDark)) {
      document.body.classList.add('light-mode');
      toggleBtn.textContent = '🌙';
    } else {
      toggleBtn.textContent = '☀️';
    }

    toggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('light-mode');
      const isLight = document.body.classList.contains('light-mode');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
      toggleBtn.textContent = isLight ? '🌙' : '☀️';
    });
  </script>
</body>
</html>
