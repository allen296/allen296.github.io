<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Commander Randomizer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="navbar-content">
      <div class="hamburger" id="hamburger">&#9776;</div>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="commander.html">Commander</a></li>
        <li><a href="#">Ilustraciones</a></li>
        <li><a href="#">Proyectos</a></li>
      </ul>
      <div class="switch" id="theme-toggle">
        <div class="slider"></div>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="row">
      <div class="player" id="player1">
        <div class="checkboxes">
          <label class="white"><input type="checkbox" value="W" data-color data-player="1">W</label>
          <label class="blue"><input type="checkbox" value="U" data-color data-player="1">U</label>
          <label class="black"><input type="checkbox" value="B" data-color data-player="1">B</label>
          <label class="red"><input type="checkbox" value="R" data-color data-player="1">R</label>
          <label class="green"><input type="checkbox" value="G" data-color data-player="1">G</label>
          <label class="colorless"><input type="checkbox" value="C" data-color data-player="1">C</label>
        </div>
        <div class="card-section">
          <div class="image-slot" id="player1-img"></div>
        </div>
      </div>

      <div class="controls-column">
        <div class="control-line">
          <input type="checkbox" id="legendary1" checked>
          <span>Legendaria</span>
          <input type="checkbox" id="legendary2" checked>
        </div>
        <div class="control-line">
          <input type="checkbox" id="lock1">
          <span>Lock</span>
          <input type="checkbox" id="lock2">
        </div>
        <div class="control-line">
          <input type="checkbox" id="random1">
          <span>Cualquier color</span>
          <input type="checkbox" id="random2">
        </div>
      </div>

      <div class="player" id="player2">
        <div class="card-section">
          <div class="image-slot" id="player2-img"></div>
        </div>
        <div class="checkboxes">
          <label class="white"><input type="checkbox" value="W" data-color data-player="2">W</label>
          <label class="blue"><input type="checkbox" value="U" data-color data-player="2">U</label>
          <label class="black"><input type="checkbox" value="B" data-color data-player="2">B</label>
          <label class="red"><input type="checkbox" value="R" data-color data-player="2">R</label>
          <label class="green"><input type="checkbox" value="G" data-color data-player="2">G</label>
          <label class="colorless"><input type="checkbox" value="C" data-color data-player="2">C</label>
        </div>
      </div>
    </div>

    <div class="controls-column">
      <button id="randomize">Randomize</button>
    </div>

    <div class="row">
      <div class="player" id="player3">
        <div class="checkboxes">
          <label class="white"><input type="checkbox" value="W" data-color data-player="3">W</label>
          <label class="blue"><input type="checkbox" value="U" data-color data-player="3">U</label>
          <label class="black"><input type="checkbox" value="B" data-color data-player="3">B</label>
          <label class="red"><input type="checkbox" value="R" data-color data-player="3">R</label>
          <label class="green"><input type="checkbox" value="G" data-color data-player="3">G</label>
          <label class="colorless"><input type="checkbox" value="C" data-color data-player="3">C</label>
        </div>
        <div class="card-section">
          <div class="image-slot" id="player3-img"></div>
        </div>
      </div>

      <div class="controls-column">
        <div class="control-line">
          <input type="checkbox" id="legendary3" checked>
          <span>Legendaria</span>
          <input type="checkbox" id="legendary4" checked>
        </div>
        <div class="control-line">
          <input type="checkbox" id="lock3">
          <span>Lock</span>
          <input type="checkbox" id="lock4">
        </div>
        <div class="control-line">
          <input type="checkbox" id="random3">
          <span>Cualquier color</span>
          <input type="checkbox" id="random4">
        </div>
      </div>

      <div class="player" id="player4">
        <div class="card-section">
          <div class="image-slot" id="player4-img"></div>
        </div>
        <div class="checkboxes">
          <label class="white"><input type="checkbox" value="W" data-color data-player="4">W</label>
          <label class="blue"><input type="checkbox" value="U" data-color data-player="4">U</label>
          <label class="black"><input type="checkbox" value="B" data-color data-player="4">B</label>
          <label class="red"><input type="checkbox" value="R" data-color data-player="4">R</label>
          <label class="green"><input type="checkbox" value="G" data-color data-player="4">G</label>
          <label class="colorless"><input type="checkbox" value="C" data-color data-player="4">C</label>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    // Tema
    const toggleBtn = document.getElementById('theme-toggle');
    const savedTheme = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

    if (savedTheme === 'light' || (!savedTheme && !prefersDark)) {
      document.body.classList.add('light-mode');
    }

    toggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('light-mode');
      const isLight = document.body.classList.contains('light-mode');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
    });

    // Hamburguesa
    document.getElementById("hamburger").addEventListener("click", () => {
      document.getElementById("nav-links").classList.toggle("open");
    });
  </script>
</body>
</html>
