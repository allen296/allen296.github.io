<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Commander Randomizer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="navbar-content">
      <button id="menu-toggle" class="hamburger">☰</button>

      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="commander.html">Commander</a></li>
        <li><a href="#">Ilustraciones</a></li>
        <li><a href="#">Proyectos</a></li>
      </ul>

      <div id="theme-switch" class="switch">
        <div class="slider">
          <span class="icon">🌙</span>
        </div>
      </div>
    </div>
  </nav>

  <div class="container">
    <!-- Jugadores superiores -->
    <div class="row">
      <!-- Player 1 -->
      <div class="checkboxes">
        <label class="white"><input type="checkbox" value="W" data-color>W</label>
        <label class="blue"><input type="checkbox" value="U" data-color>U</label>
        <label class="black"><input type="checkbox" value="B" data-color>B</label>
        <label class="red"><input type="checkbox" value="R" data-color>R</label>
        <label class="green"><input type="checkbox" value="G" data-color>G</label>
      </div>

      <div class="card-section" id="player1">
        <div class="image-slot" id="player1-img"></div>
      </div>

      <!-- Controles centrales superiores -->
      <div class="controls-column">
        <div class="control-line">
          <input type="checkbox" class="legendary-toggle" data-player="1">
          Legendaria
          <input type="checkbox" class="legendary-toggle" data-player="2">
        </div>
        <div class="control-line">
          <input type="checkbox" class="lock-toggle" data-player="1">
          Lock
          <input type="checkbox" class="lock-toggle" data-player="2">
        </div>
        <div class="control-line">
          <input type="checkbox" class="random-toggle" data-player="1">
          Cualquier color
          <input type="checkbox" class="random-toggle" data-player="2">
        </div>
      </div>

      <!-- Player 2 -->
      <div class="card-section" id="player2">
        <div class="image-slot" id="player2-img"></div>
      </div>

      <div class="checkboxes">
        <label class="white"><input type="checkbox" value="W" data-color>W</label>
        <label class="blue"><input type="checkbox" value="U" data-color>U</label>
        <label class="black"><input type="checkbox" value="B" data-color>B</label>
        <label class="red"><input type="checkbox" value="R" data-color>R</label>
        <label class="green"><input type="checkbox" value="G" data-color>G</label>
      </div>
    </div>

    <div class="middle">
      <button id="randomize">Randomize</button>
    </div>

    <!-- Jugadores inferiores -->
    <div class="row">
      <!-- Player 3 -->
      <div class="checkboxes">
        <label class="white"><input type="checkbox" value="W" data-color>W</label>
        <label class="blue"><input type="checkbox" value="U" data-color>U</label>
        <label class="black"><input type="checkbox" value="B" data-color>B</label>
        <label class="red"><input type="checkbox" value="R" data-color>R</label>
        <label class="green"><input type="checkbox" value="G" data-color>G</label>
      </div>

      <div class="card-section" id="player3">
        <div class="image-slot" id="player3-img"></div>
      </div>

      <!-- Controles centrales inferiores -->
      <div class="controls-column">
        <div class="control-line">
          <input type="checkbox" class="legendary-toggle" data-player="3">
          Legendaria
          <input type="checkbox" class="legendary-toggle" data-player="4">
        </div>
        <div class="control-line">
          <input type="checkbox" class="lock-toggle" data-player="3">
          Lock
          <input type="checkbox" class="lock-toggle" data-player="4">
        </div>
        <div class="control-line">
          <input type="checkbox" class="random-toggle" data-player="3">
          Cualquier color
          <input type="checkbox" class="random-toggle" data-player="4">
        </div>
      </div>

      <!-- Player 4 -->
      <div class="card-section" id="player4">
        <div class="image-slot" id="player4-img"></div>
      </div>

      <div class="checkboxes">
        <label class="white"><input type="checkbox" value="W" data-color>W</label>
        <label class="blue"><input type="checkbox" value="U" data-color>U</label>
        <label class="black"><input type="checkbox" value="B" data-color>B</label>
        <label class="red"><input type="checkbox" value="R" data-color>R</label>
        <label class="green"><input type="checkbox" value="G" data-color>G</label>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    const themeSwitch = document.getElementById("theme-switch");
    const icon = themeSwitch.querySelector(".icon");
    const savedTheme = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

    function setTheme(isLight) {
      document.body.classList.toggle('light-mode', isLight);
      icon.textContent = isLight ? '☀️' : '🌙';
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
    }

    setTheme(savedTheme === 'light' || (!savedTheme && !prefersDark));

    themeSwitch.addEventListener('click', () => {
      const isLight = !document.body.classList.contains('light-mode');
      setTheme(isLight);
    });

    const menuToggle = document.getElementById("menu-toggle");
    const navLinks = document.getElementById("nav-links");

    menuToggle.addEventListener("click", () => {
      navLinks.classList.toggle("open");
    });

    document.addEventListener("click", (e) => {
      const isClickInside = navLinks.contains(e.target) || menuToggle.contains(e.target);
      if (!isClickInside) {
        navLinks.classList.remove("open");
      }
    });
  </script>
</body>
</html>
